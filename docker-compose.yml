services:
  db:
    image: postgres:15-alpine
    container_name: simple_banking_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    container_name: simple_banking_backend
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - ./Backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db

  frontend:
    build:
      context: ./Frontend
    container_name: simple_banking_frontend
    restart: always
    ports:
      - '5173:5173'
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
